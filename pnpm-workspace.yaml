# esbuild postinstall fetches its platform binary — approved (same policy as llm-dev-kit).
# The tree-sitter-<lang> grammars ship prebuilt .wasm: their node-gyp builds must NEVER run —
# explicitly false so pnpm v11 installs exit 0 instead of erroring on undecided builds.
allowBuilds:
  esbuild: true
  tree-sitter-go: false
  tree-sitter-java: false
  tree-sitter-python: false
  tree-sitter-rust: false
