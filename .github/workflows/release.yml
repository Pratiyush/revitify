name: release

# On every push to main (i.e. every merged PR), compute the next semver from Conventional
# Commits and cut a git tag + GitHub Release. No commit is pushed back to main, so this is
# compatible with branch protection. feat -> minor, fix -> patch, feat!/BREAKING CHANGE -> major;
# chore/docs/refactor alone cut no release.
on:
  push:
    branches: [main]

permissions:
  contents: write

concurrency:
  group: release-${{ github.ref }}
  cancel-in-progress: false

jobs:
  release:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0
      - name: Compute next version tag
        id: tag
        uses: mathieudutour/github-tag-action@v6.2
        with:
          github_token: ${{ secrets.GITHUB_TOKEN }}
          default_bump: false # only release when a commit warrants a bump
          tag_prefix: v
          release_branches: main
      - name: Create GitHub Release
        if: ${{ steps.tag.outputs.new_tag != '' }}
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ steps.tag.outputs.new_tag }}
          name: ${{ steps.tag.outputs.new_tag }}
          generate_release_notes: true
