name: release

# release-please maintains a "release PR" that bumps package.json + CHANGELOG.md from Conventional
# Commits; merging that PR creates the git tag + GitHub Release. Compatible with branch protection
# (PR-based — no direct push to main). feat -> minor, fix -> patch, feat!/BREAKING -> major.
on:
  push:
    branches: [main]

permissions:
  contents: write
  pull-requests: write

jobs:
  release-please:
    runs-on: ubuntu-latest
    steps:
      - uses: googleapis/release-please-action@v4
        with:
          token: ${{ secrets.GITHUB_TOKEN }}
